name: iOS TestFlight Auto Upload

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-submit-ios:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      EAS_BUILD_NO_EXPO_GO_WARNING: "1"
      EXPO_NO_KEYCHAIN: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate required secrets
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          set -euo pipefail
          for key in EXPO_TOKEN ASC_API_KEY_ID ASC_API_ISSUER_ID ASC_API_KEY_P8; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: ${key}"
              exit 1
            fi
          done
          echo "All required secrets are present."

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          set -euo pipefail
          key_file="$(mktemp)"
          printf "%s" "$ASC_API_KEY_P8" | perl -0pe 's/\\n/\n/g' > "$key_file"

          if grep -q "BEGIN PRIVATE KEY" "$key_file"; then
            mv "$key_file" AuthKey.p8
          else
            printf "%s" "$ASC_API_KEY_P8" | base64 --decode > AuthKey.p8
            rm -f "$key_file"
          fi
          chmod 600 AuthKey.p8

          if ! grep -q "BEGIN PRIVATE KEY" AuthKey.p8 || ! grep -q "END PRIVATE KEY" AuthKey.p8; then
            echo "::error::ASC_API_KEY_P8 could not be parsed as a valid .p8 key."
            exit 1
          fi

      - name: Connect EAS project to App Store Connect
        env:
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          set -euo pipefail
          if [ -z "${ASC_APP_ID:-}" ]; then
            echo "::error::Missing required secret: ASC_APP_ID"
            exit 1
          fi
          eas integrations:asc:connect \
            --api-key-id "$ASC_API_KEY_ID" \
            --asc-app-id "$ASC_APP_ID" \
            --bundle-id "com.yutauchida.mugimaru" \
            --non-interactive
          eas integrations:asc:status --non-interactive

      - name: Inject App Store Connect settings into submit profile
        env:
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [ -z "${ASC_APP_ID:-}" ]; then
            echo "::error::Missing required secret: ASC_APP_ID"
            echo "::error::Set ASC_APP_ID to the Apple numeric App ID (not bundle id)."
            exit 1
          fi
          if [ -z "${ASC_API_KEY_ID:-}" ] || [ -z "${ASC_API_ISSUER_ID:-}" ]; then
            echo "::error::Missing App Store Connect API key id or issuer id."
            exit 1
          fi
          tmp_file="$(mktemp)"
          jq \
            --arg appId "$ASC_APP_ID" \
            --arg keyPath "AuthKey.p8" \
            --arg keyId "$ASC_API_KEY_ID" \
            --arg issuerId "$ASC_API_ISSUER_ID" \
            --arg bundleId "com.yutauchida.mugimaru" \
            '.submit.production.ios.ascAppId = $appId
              | .submit.production.ios.ascApiKeyPath = $keyPath
              | .submit.production.ios.ascApiKeyId = $keyId
              | .submit.production.ios.ascApiKeyIssuerId = $issuerId
              | .submit.production.ios.bundleIdentifier = $bundleId' \
            eas.json > "$tmp_file"
          mv "$tmp_file" eas.json
          jq -e '.submit.production.ios.ascAppId
            and .submit.production.ios.ascApiKeyPath
            and .submit.production.ios.ascApiKeyId
            and .submit.production.ios.ascApiKeyIssuerId
            and .submit.production.ios.bundleIdentifier' eas.json > /dev/null
          echo "Submit profile is configured for bundleIdentifier=com.yutauchida.mugimaru."

      - name: Build iOS (production)
        id: build_ios
        run: |
          set -euo pipefail
          eas whoami
          build_json="$(mktemp)"
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --wait \
            --json > "$build_json"
          cat "$build_json"
          build_id="$(jq -r 'if type == "array" then .[0].id else .id end' "$build_json")"
          if [ -z "$build_id" ] || [ "$build_id" = "null" ]; then
            echo "::error::Could not determine EAS build id."
            exit 1
          fi
          echo "build_id=$build_id" >> "$GITHUB_OUTPUT"

      - name: Submit iOS build to TestFlight
        run: |
          set -euo pipefail
          eas submit \
            --platform ios \
            --profile production \
            --id "${{ steps.build_ios.outputs.build_id }}" \
            --non-interactive \
            --wait \
            --verbose

      - name: Cleanup App Store Connect key
        if: always()
        run: rm -f AuthKey.p8
