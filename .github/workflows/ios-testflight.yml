name: iOS TestFlight Auto Upload

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-submit-ios:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      EAS_BUILD_NO_EXPO_GO_WARNING: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate required secrets
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          set -euo pipefail
          for key in EXPO_TOKEN ASC_API_KEY_ID ASC_API_ISSUER_ID ASC_API_KEY_P8; do
            if [ -z "${!key:-}" ]; then
              echo "::error::Missing required secret: ${key}"
              exit 1
            fi
          done
          echo "All required secrets are present."

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          set -euo pipefail
          if printf "%s" "$ASC_API_KEY_P8" | grep -q "BEGIN PRIVATE KEY"; then
            printf "%s" "$ASC_API_KEY_P8" > AuthKey.p8
          elif printf "%s" "$ASC_API_KEY_P8" | grep -q "\\\\n"; then
            printf "%b" "$ASC_API_KEY_P8" > AuthKey.p8
          else
            printf "%s" "$ASC_API_KEY_P8" | base64 --decode > AuthKey.p8
          fi

          if ! grep -q "BEGIN PRIVATE KEY" AuthKey.p8; then
            echo "::error::ASC_API_KEY_P8 could not be parsed as a valid .p8 key."
            exit 1
          fi

      - name: Build iOS (production)
        run: |
          set -euo pipefail
          eas whoami
          eas build \
            --platform ios \
            --profile production \
            --non-interactive \
            --wait

      - name: Inject App Store app id into submit profile
        env:
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
        run: |
          set -euo pipefail
          if [ -z "${ASC_APP_ID:-}" ]; then
            echo "::error::Missing required secret: ASC_APP_ID"
            echo "::error::Set ASC_APP_ID to the Apple numeric App ID (not bundle id)."
            exit 1
          fi
          tmp_file="$(mktemp)"
          jq --arg appId "$ASC_APP_ID" '.submit.production.ios.ascAppId = $appId' eas.json > "$tmp_file"
          mv "$tmp_file" eas.json

      - name: Submit latest iOS build to TestFlight
        env:
          EXPO_ASC_API_KEY_PATH: AuthKey.p8
          EXPO_ASC_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          EXPO_ASC_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          eas submit \
            --platform ios \
            --profile production \
            --latest \
            --non-interactive

      - name: Cleanup App Store Connect key
        if: always()
        run: rm -f AuthKey.p8
